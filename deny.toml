[advisories]
version = 2
# Transitive deps from SlateDB that are unmaintained but not a security concern.
ignore = [
    "RUSTSEC-2025-0141", # bincode - unmaintained (SlateDB transitive dep)
    "RUSTSEC-2024-0436", # paste - unmaintained (SlateDB transitive dep)
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Permissive licenses from DataFusion/Arrow transitive deps:
    "CC0-1.0",     # tiny-keccak (const-random-macro via ahash)
    "bzip2-1.0.6", # libbz2-rs-sys (bzip2 compression codec)
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
